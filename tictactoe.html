<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.6rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.winner {
      background: #0f3460;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    #controls {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
    }

    button {
      padding: 0.6rem 1.6rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    #btn-reset { background: #e94560; color: #fff; }
    #btn-mode  { background: #457b9d; color: #fff; }

    #scoreboard {
      margin-top: 2rem;
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: #a8dadc;
    }

    .score-block { text-align: center; }
    .score-block span { display: block; font-size: 1.8rem; font-weight: bold; color: #eee; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="controls">
    <button id="btn-reset">New Game</button>
    <button id="btn-mode">vs Computer</button>
  </div>

  <div id="scoreboard">
    <div class="score-block">X Wins<span id="score-x">0</span></div>
    <div class="score-block">Draws<span id="score-d">0</span></div>
    <div class="score-block">O Wins<span id="score-o">0</span></div>
  </div>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, gameOver, vsComputer;
    let scores = { X: 0, O: 0, D: 0 };

    const cells   = document.querySelectorAll('.cell');
    const status  = document.getElementById('status');
    const btnMode = document.getElementById('btn-mode');

    vsComputer = false;

    function init() {
      board    = Array(9).fill('');
      current  = 'X';
      gameOver = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      status.textContent = `Player X's turn`;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(v => v)) return { winner: null, line: [] };
      return null;
    }

    function applyResult(result) {
      gameOver = true;
      if (result.winner) {
        result.line.forEach(i => cells[i].classList.add('winner'));
        const who = vsComputer && result.winner === 'O' ? 'Computer' : `Player ${result.winner}`;
        status.textContent = `${who} wins!`;
        scores[result.winner]++;
      } else {
        status.textContent = "It's a draw!";
        scores.D++;
      }
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-d').textContent = scores.D;
    }

    function minimax(b, isMax) {
      const res = checkBoardResult(b);
      if (res !== undefined) return res;
      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i] = 'O'; best = Math.max(best, minimax(b, false)); b[i] = ''; }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i] = 'X'; best = Math.min(best, minimax(b, true)); b[i] = ''; }
        }
        return best;
      }
    }

    function checkBoardResult(b) {
      for (const [a, bv, c] of WINS) {
        if (b[a] && b[a] === b[bv] && b[a] === b[c]) return b[a] === 'O' ? 1 : -1;
      }
      if (b.every(v => v)) return 0;
      return undefined;
    }

    function computerMove() {
      let best = -Infinity, move = -1;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          const val = minimax(board, false);
          board[i] = '';
          if (val > best) { best = val; move = i; }
        }
      }
      if (move !== -1) placeAt(move);
    }

    function placeAt(i) {
      board[i] = current;
      cells[i].textContent = current;
      cells[i].classList.add(current.toLowerCase(), 'taken');

      const result = checkWinner();
      if (result) { applyResult(result); return; }

      current = current === 'X' ? 'O' : 'X';
      const who = vsComputer && current === 'O' ? 'Computer' : `Player ${current}`;
      status.textContent = `${who}'s turn`;

      if (vsComputer && current === 'O' && !gameOver) {
        setTimeout(computerMove, 350);
      }
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameOver || board[i] || (vsComputer && current === 'O')) return;
        placeAt(i);
      });
    });

    document.getElementById('btn-reset').addEventListener('click', init);

    btnMode.addEventListener('click', () => {
      vsComputer = !vsComputer;
      btnMode.textContent = vsComputer ? 'vs Human' : 'vs Computer';
      scores = { X: 0, O: 0, D: 0 };
      document.getElementById('score-x').textContent = 0;
      document.getElementById('score-o').textContent = 0;
      document.getElementById('score-d').textContent = 0;
      init();
    });

    init();
  </script>
</body>
</html>
